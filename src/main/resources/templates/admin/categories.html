<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="vi">
<head th:replace="~{layout :: head}"></head>
<body>
<nav th:replace="~{layout :: header}"></nav>
<link rel="stylesheet" th:href="@{/css/admin.css}">

<!-- Admin Navigation -->
<div class="bg-light border-bottom">
    <div class="container py-2">
        <div class="btn-group" role="group">
            <a th:href="@{/admin}" class="btn btn-sm btn-outline-primary">Dashboard</a>
            <a th:href="@{/admin/books}" class="btn btn-sm btn-outline-primary">Quản lý Sách</a>
            <a th:href="@{/admin/categories}" class="btn btn-sm btn-primary active">Quản lý Thể Loại</a>
            <a th:href="@{/admin/orders}" class="btn btn-sm btn-outline-primary">Lịch sử Bán Hàng</a>
        </div>
    </div>
</div>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="font-serif fw-bold mb-0">Quản Lý Thể Loại</h1>
        <button class="btn btn-primary" type="button" data-bs-toggle="modal" data-bs-target="#addCategoryModal" title="Thêm thể loại mới">
            <i class="bi bi-plus-circle me-2"></i>Thêm Thể Loại
        </button>
    </div>

    <!-- Error Alert -->
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle me-2"></i>
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Categories Table -->
    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="admin-table-stt">STT</th>
                            <th>Tên Thể Loại</th>
                            <th class="admin-table-actions">Hành Động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="category,stat : ${categories}">
                            <td th:text="${stat.count}">1</td>
                            <td th:text="${category.name}">Tên Thể Loại</td>
                            <td>
                                <button type="button"
                                        class="btn btn-sm btn-warning"
                                        data-bs-toggle="modal"
                                        data-bs-target="#editCategoryModal"
                                        th:attr="data-category-id=${category.id},data-category-name=${category.name}"
                                        onclick="editCategory(this)">
                                    <i class="bi bi-pencil"></i> Sửa
                                </button>
                                <a th:href="@{/admin/categories/delete/{id}(id=${category.id})}" class="btn btn-sm btn-danger" 
                                   onclick="return confirm('Bạn chắc chắn muốn xóa thể loại này?');">
                                    <i class="bi bi-trash"></i> Xóa
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(categories)}">
                            <td colspan="3" class="text-center text-muted py-4">Chưa có thể loại nào</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Add Category Modal -->
<div class="modal fade" id="addCategoryModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Thêm Thể Loại Mới</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/admin/categories/save}" method="post">
                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Tên Thể Loại <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="name" placeholder="Nhập tên thể loại" title="Tên thể loại sách" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" title="Đóng cửa sổ">Đóng</button>
                    <button type="submit" class="btn btn-primary" title="Thêm thể loại mới">Thêm Thể Loại</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Edit Category Modal -->
<div class="modal fade" id="editCategoryModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Sửa Thể Loại</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/admin/categories/save}" method="post">
                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="modal-body">
                    <input type="hidden" id="editCategoryId" name="id">
                    <div class="mb-3">
                        <label class="form-label">Tên Thể Loại <span class="text-danger">*</span></label>
                        <input type="text" id="editCategoryName" class="form-control" name="name" placeholder="Nhập tên thể loại" title="Tên thể loại sách" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" title="Đóng cửa sổ">Đóng</button>
                    <button type="submit" class="btn btn-primary" title="Lưu thay đổi">Lưu Thay Đổi</button>
                </div>
            </form>
        </div>
    </div>
</div>

<footer th:replace="~{layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function editCategory(btn) {
    const id = btn.getAttribute('data-category-id');
    const name = btn.getAttribute('data-category-name');
    document.getElementById('editCategoryId').value = id || '';
    document.getElementById('editCategoryName').value = name || '';
}
</script>
</body>
</html>
