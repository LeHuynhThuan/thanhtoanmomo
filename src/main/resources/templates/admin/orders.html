<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="vi">
<head th:replace="~{layout :: head}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch Sử Bán Hàng</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<nav th:replace="~{layout :: header}"></nav>
<link rel="stylesheet" th:href="@{/css/admin.css}">

<!-- Admin Navigation -->
<div class="bg-light border-bottom">
    <div class="container py-2">
        <div class="btn-group" role="group">
            <a th:href="@{/admin}" class="btn btn-sm btn-outline-primary">Dashboard</a>
            <a th:href="@{/admin/books}" class="btn btn-sm btn-outline-primary">Quản lý Sách</a>
            <a th:href="@{/admin/categories}" class="btn btn-sm btn-outline-primary">Quản lý Thể Loại</a>
            <a th:href="@{/admin/orders}" class="btn btn-sm btn-primary active">Lịch sử Bán Hàng</a>
        </div>
    </div>
</div>

<div class="container py-5">
    <h1 class="font-serif fw-bold mb-4">Lịch Sử Bán Hàng</h1>

    <!-- Error Alert -->
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle me-2"></i>
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Orders Table -->
    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Mã Đơn</th>
                            <th>Khách Hàng</th>
                            <th>Ngày Đặt</th>
                            <th>Tổng Tiền</th>
                            <th>Trạng Thái</th>
                            <th>Hành Động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="order : ${orders}">
                            <td>
                                <code th:text="${#strings.abbreviate(order.id, 8)}">ID</code>
                            </td>
                            <td>
                                <strong th:text="${order.customerName}">Khách</strong><br>
                                <small class="text-muted" th:text="${order.customerEmail}">email</small>
                            </td>
                            <td th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}">Ngày</td>
                            <td th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'DEFAULT', 0, 'DEFAULT')} + ' VND'">0 VND</td>
                            <td>
                                <span th:class="'badge status-badge status-' + ${order.status.name().toLowerCase()}" 
                                      th:text="${order.status.displayName}">
                                    Status
                                </span>
                            </td>
                            <td>
                                <a th:href="@{/admin/orders/{id}(id=${order.id})}" class="btn btn-sm btn-info" title="Xem chi tiết đơn hàng">
                                    <i class="bi bi-eye"></i> Chi Tiết
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(orders)}">
                            <td colspan="6" class="text-center text-muted py-4">Chưa có đơn hàng nào</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
