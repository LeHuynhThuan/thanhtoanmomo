<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="vi">
<head th:replace="~{layout :: head}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Sách</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<nav th:replace="~{layout :: header}"></nav>
<link rel="stylesheet" th:href="@{/css/admin.css}">
<input type="hidden" id="csrfToken" th:if="${_csrf != null}" th:value="${_csrf.token}" th:data-header="${_csrf.headerName}">

<!-- Admin Navigation -->
<div class="bg-light border-bottom">
    <div class="container py-2">
        <div class="btn-group" role="group">
            <a th:href="@{/admin}" class="btn btn-sm btn-outline-primary">Dashboard</a>
            <a th:href="@{/admin/books}" class="btn btn-sm btn-primary active">Quản lý Sách</a>
            <a th:href="@{/admin/categories}" class="btn btn-sm btn-outline-primary">Quản lý Thể Loại</a>
            <a th:href="@{/admin/orders}" class="btn btn-sm btn-outline-primary">Lịch sử Bán Hàng</a>
        </div>
    </div>
</div>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="font-serif fw-bold mb-0">Quản Lý Sách</h1>
        <button class="btn btn-primary" type="button" data-bs-toggle="modal" data-bs-target="#addBookModal" title="Thêm sách mới">
            <i class="bi bi-plus-circle me-2"></i>Thêm Sách
        </button>
    </div>

    <!-- Books Table -->
    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Ảnh</th>
                            <th>Tiêu Đề</th>
                            <th>Tác Giả</th>
                            <th>Thể Loại</th>
                            <th>Giá</th>
                            <th>Hành Động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="book : ${books}">
                            <td>
                                <img th:if="${book.image}" th:src="${book.image}" 
                                     class="admin-books-img rounded"  
                                     th:alt="${book.title}" th:title="${book.title}">
                                <span th:unless="${book.image}" class="text-muted small">N/A</span>
                            </td>
                            <td>
                                <strong th:text="${book.title}">Tiêu Đề</strong>
                            </td>
                            <td th:text="${book.author}">Tác Giả</td>
                            <td>
                                <span class="badge bg-info" th:text="${book.category?.name} != null ? ${book.category?.name} : 'Khác'">Khác</span>
                            </td>
                            <td th:text="${#numbers.formatDecimal(book.price, 0, 'DEFAULT', 0, 'DEFAULT')} + ' VND'">0 VND</td>
                            <td>
                                <a th:href="@{/admin/books/edit/{id}(id=${book.id})}" class="btn btn-sm btn-warning" title="Sửa thông tin sách">
                                    <i class="bi bi-pencil"></i> Sửa
                                </a>
                                <a th:href="@{/admin/books/delete/{id}(id=${book.id})}" class="btn btn-sm btn-danger" 
                                   onclick="return confirm('Bạn chắc chắn muốn xóa sách này?');" title="Xóa sách">
                                    <i class="bi bi-trash"></i> Xóa
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(books)}">
                            <td colspan="6" class="text-center text-muted py-4">Chưa có sách nào</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Add Book Modal -->
<div class="modal fade" id="addBookModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Thêm Sách Mới</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/admin/books/save}" method="post" enctype="multipart/form-data" th:object="${newBook}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="title" class="form-label">Tiêu Đề <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{title}" placeholder="Nhập tiêu đề" title="Tiêu đề sách" required>
                        <small class="text-danger" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></small>
                    </div>

                    <div class="mb-3">
                        <label for="author" class="form-label">Tác Giả <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{author}" placeholder="Nhập tác giả" required>
                        <small class="text-danger" th:if="${#fields.hasErrors('author')}" th:errors="*{author}"></small>
                    </div>

                    <div class="mb-3">
                        <label for="price" class="form-label">Giá <span class="text-danger">*</span></label>
                        <input type="number" step="0.01" class="form-control" th:field="*{price}" placeholder="Nhập giá" required>
                        <small class="text-danger" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></small>
                    </div>

                    <div class="mb-3">
                        <label for="categoryId" class="form-label">Thể Loại <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <select class="form-select" th:field="*{categoryId}" title="Chọn thể loại sách" required>
                                <option value="" selected disabled>Chọn thể loại</option>
                                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                            </select>
                            <button class="btn btn-outline-secondary" type="button" data-bs-toggle="modal" data-bs-target="#addCategoryModal" title="Thêm thể loại mới">
                                <i class="bi bi-plus"></i>
                            </button>
                        </div>
                        <small class="text-danger" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></small>
                    </div>

                    <div class="mb-3">
                        <label for="bookImage" class="form-label">Ảnh <span class="text-danger">*</span></label>
                        <input type="file" class="form-control" id="bookImage" name="imageFile" accept="image/png,image/jpeg,image/jpg" title="Tải lên ảnh sách" required>
                        <small class="text-muted">PNG, JPG, JPEG, tối đa 5MB</small>
                        <small class="text-danger" th:if="${#fields.hasErrors('image')}" th:errors="*{image}"></small>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Mô Tả</label>
                        <textarea class="form-control" th:field="*{description}" rows="3" placeholder="Nhập mô tả"></textarea>
                        <small class="text-danger" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></small>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    <button type="submit" class="btn btn-primary">Lưu Sách</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Add Category Modal -->
<div class="modal fade" id="addCategoryModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Thêm Thể Loại Mới</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label for="categoryName" class="form-label">Tên Thể Loại <span class="text-danger">*</span></label>
                    <input type="text" id="categoryName" class="form-control" placeholder="Nhập tên thể loại" required>
                    <small id="categoryError" class="text-danger d-none"></small>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" title="Đóng cửa sổ">Đóng</button>
                <button type="button" class="btn btn-primary" id="addCategoryBtn" title="Thêm thể loại mới">Thêm Thể Loại</button>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('addCategoryBtn').addEventListener('click', function() {
    const name = document.getElementById('categoryName').value.trim();
    const errorEl = document.getElementById('categoryError');
    const csrfEl = document.getElementById('csrfToken');
    const csrfToken = csrfEl ? csrfEl.value : null;
    const csrfHeader = csrfEl ? csrfEl.dataset.header : null;
    
    if (!name) {
        errorEl.textContent = 'Vui lòng nhập tên thể loại';
        errorEl.classList.remove('d-none');
        return;
    }
    
    const headers = {};
    if (csrfToken && csrfHeader) {
        headers[csrfHeader] = csrfToken;
    }
    
    fetch('/admin/categories/add-modal?name=' + encodeURIComponent(name), {
        method: 'POST',
        headers
    })
    .then(resp => resp.json())
    .then(data => {
        if (data.success) {
            // Add to select dropdown
            const select = document.getElementById('categoryId');
            const option = document.createElement('option');
            option.value = data.id;
            option.textContent = data.name;
            option.selected = true;
            select.appendChild(option);
            
            // Reset form and close modal
            document.getElementById('categoryName').value = '';
            errorEl.classList.add('d-none');
            bootstrap.Modal.getInstance(document.getElementById('addCategoryModal')).hide();
        } else {
            errorEl.textContent = data.message;
            errorEl.classList.remove('d-none');
        }
    })
    .catch(err => {
        errorEl.textContent = 'Lỗi khi thêm thể loại';
        errorEl.classList.remove('d-none');
    });
});
</script>
<script th:if="${showAddBookModal}">
document.addEventListener('DOMContentLoaded', function () {
    var modalEl = document.getElementById('addBookModal');
    if (modalEl && window.bootstrap) {
        var modal = new bootstrap.Modal(modalEl);
        modal.show();
    }
});
</script>
</body>
</html>
