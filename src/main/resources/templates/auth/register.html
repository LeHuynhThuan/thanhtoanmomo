<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layout :: head}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>
</head>
<body>
<nav th:replace="~{layout :: header}"></nav>

<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-success text-white text-center">
                    <h4 class="mb-0"><i class="bi bi-person-plus"></i> Đăng ký tài khoản</h4>
                </div>
                <div class="card-body p-4">
                    <div class="alert alert-danger" th:if="${error}">
                        <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}">Error</span>
                    </div>
                    <div class="alert alert-danger" th:if="${usernameError}">
                        <i class="bi bi-exclamation-triangle"></i> <span th:text="${usernameError}">Username error</span>
                    </div>
                    <div class="alert alert-danger" th:if="${emailError}">
                        <i class="bi bi-exclamation-triangle"></i> <span th:text="${emailError}">Email error</span>
                    </div>

                    <form th:action="@{/auth/register}" th:object="${user}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label fw-bold">Tên đăng nhập <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="username" th:field="*{username}" required minlength="3">
                            <div class="text-danger small" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label fw-bold">Mật khẩu <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" id="password" th:field="*{password}" required minlength="6">
                            <div class="text-danger small" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                        </div>
                        <div class="mb-3">
                            <label for="fullName" class="form-label fw-bold">Họ và tên <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="fullName" th:field="*{fullName}" required>
                            <div class="text-danger small" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label fw-bold">Email <span class="text-danger">*</span></label>
                            <input type="email" class="form-control" id="email" th:field="*{email}" required>
                            <div class="text-danger small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>
                        <div class="mb-3">
                            <label for="phone" class="form-label fw-bold">Điện thoại</label>
                            <input type="tel" class="form-control" id="phone" th:field="*{phone}">
                        </div>
                        <button type="submit" class="btn btn-success w-100">
                            <i class="bi bi-person-plus"></i> Đăng ký
                        </button>
                    </form>

                    <hr>
                    <p class="text-center mb-0">
                        Đã có tài khoản? 
                        <a th:href="@{/auth/login}" class="text-decoration-none">Đăng nhập ngay</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
