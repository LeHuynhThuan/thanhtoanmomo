<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layout :: head}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
</head>
<body>
<nav th:replace="~{layout :: header}"></nav>

<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white text-center">
                    <h4 class="mb-0"><i class="bi bi-box-arrow-in-right"></i> Đăng nhập</h4>
                </div>
                <div class="card-body p-4">
                    <div class="alert alert-danger" th:if="${param.error}">
                        <i class="bi bi-exclamation-triangle"></i> Tên đăng nhập hoặc mật khẩu không đúng.
                    </div>
                    <div class="alert alert-success" th:if="${param.logout}">
                        <i class="bi bi-check-circle"></i> Đăng xuất thành công.
                    </div>
                    <div class="alert alert-success" th:if="${param.registered}">
                        <i class="bi bi-check-circle"></i> Đăng ký thành công. Vui lòng đăng nhập.
                    </div>

                    <form th:action="@{/auth/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label fw-bold">Tên đăng nhập</label>
                            <input type="text" class="form-control" id="username" name="username" required autofocus autocomplete="username">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label fw-bold">Mật khẩu</label>
                            <input type="password" class="form-control" id="password" name="password" required autocomplete="current-password">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-box-arrow-in-right"></i> Đăng nhập
                        </button>
                    </form>

                    <hr>
                    <p class="text-center mb-0">
                        Chưa có tài khoản? 
                        <a th:href="@{/auth/register}" class="text-decoration-none">Đăng ký ngay</a>
                    </p>
                    <div class="mt-3 p-3 bg-light rounded">
                        <small class="text-muted d-block mb-2"><strong>Tài khoản demo:</strong></small>
                        <small class="d-block">Admin: admin / admin123</small>
                        <small class="d-block">User: user / user123</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
