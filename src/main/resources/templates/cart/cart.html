<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="vi">
<head th:replace="~{layout :: head}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng</title>
</head>
<body>
<nav th:replace="~{layout :: header}"></nav>

<main class="container my-5">
    <h2 class="fw-bold mb-4"><i class="bi bi-cart3"></i> Giỏ hàng</h2>

    <div class="alert alert-danger alert-dismissible fade show" th:if="${error}" role="alert">
        <i class="bi bi-exclamation-triangle me-2"></i>
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="alert alert-info" th:if="${cart.items == null || cart.items.isEmpty()}">
        <i class="bi bi-info-circle"></i> Giỏ hàng của bạn đang trống.
        <a th:href="@{/books/list}" class="alert-link">Tiếp tục mua sách</a>
    </div>

    <div th:if="${cart.items != null && !cart.items.isEmpty()}">
        <div class="card shadow-sm border-0 mb-4">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Hình ảnh</th>
                            <th>Tên sách</th>
                            <th>Giá</th>
                            <th>Số lượng</th>
                            <th>Thành tiền</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${cart.items}">
                            <td>
                                <img th:src="${item.book.image != null && !item.book.image.isEmpty() ? item.book.image : 'https://via.placeholder.com/80'}"
                                     style="width: 60px; height: 80px; object-fit: cover;" alt="Book">
                            </td>
                            <td>
                                <strong th:text="${item.book.title}">Title</strong><br>
                                <small class="text-muted" th:text="${item.book.author}">Author</small>
                            </td>
                            <td th:text="${#numbers.formatDecimal(item.book.price, 0, 'COMMA', 0, 'POINT')} + ' VND'">0 VND</td>
                            <td>
                                <form th:action="@{/cart/update/{id}(id=${item.book.id})}" method="post" class="d-flex gap-1">
                                    <input type="number" name="quantity" th:value="${item.quantity}" min="1" max="99" class="form-control" style="width: 70px;"
                                           aria-label="Số lượng" title="Số lượng">
                                    <button type="submit" class="btn btn-sm btn-outline-primary" title="Cập nhật số lượng" aria-label="Cập nhật số lượng">
                                        <i class="bi bi-arrow-repeat"></i>
                                    </button>
                                </form>
                            </td>
                            <td class="fw-bold text-danger" th:text="${#numbers.formatDecimal(item.subTotal, 0, 'COMMA', 0, 'POINT')} + ' VND'">0 VND</td>
                            <td>
                                <a th:href="@{/cart/remove/{id}(id=${item.book.id})}" class="btn btn-sm btn-danger"
                                   onclick="return confirm('Xóa khỏi giỏ hàng?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <a th:href="@{/books/list}" class="btn btn-outline-primary">
                    <i class="bi bi-arrow-left"></i> Tiếp tục mua hàng
                </a>
                <a th:href="@{/cart/clear}" class="btn btn-outline-danger" onclick="return confirm('Xóa toàn bộ giỏ hàng?')">
                    <i class="bi bi-trash"></i> Xóa giỏ hàng
                </a>
            </div>
            <div class="col-md-6 text-md-end mt-3 mt-md-0">
                <div class="card d-inline-block shadow-sm" style="min-width: 250px;">
                    <div class="card-body">
                        <h5 class="card-title">Tổng cộng:</h5>
                        <h3 class="text-danger fw-bold mb-3" th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')} + ' VND'">0 VND</h3>
                        <a th:href="@{/checkout}" class="btn btn-success w-100">
                            <i class="bi bi-credit-card"></i> Thanh toán
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
