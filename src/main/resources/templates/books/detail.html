<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="vi">
<head th:replace="~{layout :: head}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${book.title}">Chi tiết sách</title>
</head>
<body>
<nav th:replace="~{layout :: header}"></nav>

<main class="container my-5">
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card shadow-sm border-0">
                <img th:src="${book.image != null && !book.image.isEmpty() ? book.image : 'https://via.placeholder.com/300x400?text=No+Image'}"
                     class="card-img-top" th:alt="${book.title}">
            </div>
        </div>
        <div class="col-md-8">
            <h2 class="fw-bold mb-2" th:text="${book.title}">Tiêu đề sách</h2>
            <p class="text-muted mb-2">
                <i class="bi bi-person"></i>
                <span th:text="${book.author}">Tác giả</span>
            </p>
            <p class="text-muted mb-2" th:if="${book.category != null}">
                <i class="bi bi-tag"></i>
                <span th:text="${book.category.name}">Danh mục</span>
            </p>
            <h4 class="text-danger fw-bold mb-4"
                th:text="${#numbers.formatDecimal(book.price, 0, 'COMMA', 0, 'POINT')} + ' VND'">0 VND</h4>

            <div class="mb-4" th:if="${book.description}">
                <h5 class="fw-bold">Mô tả</h5>
                <p th:text="${book.description}">Mô tả sách</p>
            </div>

            <div class="d-flex gap-2">
                <form th:action="@{/cart/add/{id}(id=${book.id})}" method="post">
                    <input type="hidden" name="quantity" value="1">
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-cart-plus"></i> Thêm vào giỏ
                    </button>
                </form>
                <a th:href="@{/books/list}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i> Quay lại danh sách
                </a>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
