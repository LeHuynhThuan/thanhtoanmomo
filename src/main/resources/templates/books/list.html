<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="vi">
<head th:replace="~{layout :: head}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách sách</title>
</head>
<body>
<nav th:replace="~{layout :: header}"></nav>

<main class="container my-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0"><i class="bi bi-book"></i> Danh sách sách</h2>
        <a th:href="@{/admin/books}" class="btn btn-success" sec:authorize="hasRole('ADMIN')">
            <i class="bi bi-plus-circle"></i> Quản lý sách (Admin)
        </a>
    </div>

    <!-- Search & Filter -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">
            <form th:action="@{/books/search}" method="get" class="row g-3">
                <div class="col-md-5">
                    <label for="keyword" class="visually-hidden">Từ khóa tìm kiếm</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-search"></i></span>
                        <input type="text" class="form-control" id="keyword" name="keyword" th:value="${keyword}"
                               placeholder="Tìm kiếm theo tiêu đề, tác giả...">
                    </div>
                </div>
                <div class="col-md-4">
                    <label for="categoryId" class="visually-hidden">Lọc theo danh mục</label>
                    <select class="form-select" id="categoryId" name="categoryId">
                        <option value="">-- Tất cả danh mục --</option>
                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                                th:selected="${cat.id == selectedCategory}">Category</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-primary w-100"><i class="bi bi-search"></i> Tìm kiếm</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Book List -->
    <div class="row g-4" th:if="${books != null && !books.isEmpty()}">
        <div class="col-md-3" th:each="book : ${books}">
            <div class="card h-100 shadow-sm border-0 book-card">
                <img th:src="${book.image != null && !book.image.isEmpty() ? book.image : 'https://via.placeholder.com/200x280?text=No+Image'}"
                     class="card-img-top" alt="Book Image" style="height: 250px; object-fit: cover;">
                <div class="card-body d-flex flex-column">
                    <h6 class="card-title fw-bold" th:text="${book.title}">Book Title</h6>
                    <p class="text-muted small mb-1">
                        <i class="bi bi-person"></i> <span th:text="${book.author}">Author</span>
                    </p>
                    <p class="text-muted small mb-1" th:if="${book.category != null}">
                        <i class="bi bi-tag"></i> <span th:text="${book.category.name}">Category</span>
                    </p>
                    <p class="text-muted small mb-2">
                        <i class="bi bi-box-seam"></i>
                        <span th:if="${book.stock > 0}" th:text="'Còn ' + ${book.stock} + ' cuốn'">Còn 0 cuốn</span>
                        <span th:if="${book.stock <= 0}" class="text-danger">Hết hàng</span>
                    </p>
                    <p class="text-danger fw-bold mt-auto" th:text="${#numbers.formatDecimal(book.price, 0, 'COMMA', 0, 'POINT')} + ' VND'">0 VND</p>

                    <div class="d-flex gap-1">
                        <form th:action="@{/cart/add/{id}(id=${book.id})}" method="post" class="flex-grow-1">
                            <input type="hidden" name="quantity" value="1">
                            <button type="submit" class="btn btn-primary btn-sm w-100"
                                    th:disabled="${book.stock <= 0}">
                                <i class="bi bi-cart-plus"></i> Thêm
                            </button>
                        </form>
                        <div sec:authorize="hasRole('ADMIN')" class="d-flex gap-1">
                            <a th:href="@{/admin/books/edit/{id}(id=${book.id})}" class="btn btn-warning btn-sm">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/admin/books/delete/{id}(id=${book.id})}" class="btn btn-danger btn-sm"
                               onclick="return confirm('Bạn có chắc muốn xóa sách này?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="alert alert-info text-center" th:if="${books == null || books.isEmpty()}">
        <i class="bi bi-info-circle"></i> Không tìm thấy sách nào.
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
