<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="vi">
<head th:replace="~{layout :: head}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán</title>
</head>
<body>
<nav th:replace="~{layout :: header}"></nav>

<main class="container my-5">
    <h2 class="fw-bold mb-4"><i class="bi bi-credit-card"></i> Thanh toán</h2>

    <div class="row">
        <div class="col-md-7">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="bi bi-person"></i> Thông tin khách hàng</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/checkout}" method="post">
                        <div class="mb-3">
                            <label for="customerName" class="form-label fw-bold">Họ và tên <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="customerName" name="customerName" 
                                   th:value="${user != null ? user.fullName : ''}" required>
                        </div>
                        <div class="mb-3">
                            <label for="customerEmail" class="form-label fw-bold">Email <span class="text-danger">*</span></label>
                            <input type="email" class="form-control" id="customerEmail" name="customerEmail" 
                                   th:value="${user != null ? user.email : ''}" required>
                        </div>
                        <div class="mb-3">
                            <label for="customerPhone" class="form-label fw-bold">Điện thoại <span class="text-danger">*</span></label>
                            <input type="tel" class="form-control" id="customerPhone" name="customerPhone" 
                                   th:value="${user != null ? user.phone : ''}" required>
                        </div>
                        <div class="mb-3">
                            <label for="customerAddress" class="form-label fw-bold">Địa chỉ nhận hàng <span class="text-danger">*</span></label>
                            <textarea class="form-control" id="customerAddress" name="customerAddress" rows="2" required></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Phương thức thanh toán</label>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="paymentMethod" id="paymentCod" value="cod" checked>
                                <label class="form-check-label" for="paymentCod">
                                    Thanh toán khi nhận hàng (COD)
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="paymentMethod" id="paymentMomo" value="momo">
                                <label class="form-check-label" for="paymentMomo">
                                    Ví MoMo
                                </label>
                            </div>
                        </div>

                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <button type="submit" class="btn btn-success w-100">
                            <i class="bi bi-check-circle"></i> Đặt hàng
                        </button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-5">
            <div class="alert alert-success alert-dismissible fade show" th:if="${voucherSuccess}" role="alert">
                <i class="bi bi-check-circle me-2"></i><span th:text="${voucherSuccess}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div class="alert alert-danger alert-dismissible fade show" th:if="${voucherError}" role="alert">
                <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${voucherError}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div class="alert alert-danger alert-dismissible fade show" th:if="${paymentError}" role="alert">
                <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${paymentError}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card shadow-sm border-0 mb-3">
                <div class="card-header bg-light">
                    <h5 class="mb-0"><i class="bi bi-tag"></i> Mã giảm giá</h5>
                </div>
                <div class="card-body">
                    <div th:if="${appliedVoucher != null}" class="mb-2">
                        <span class="badge bg-success me-2" th:text="${appliedVoucher.code}">CODE</span>
                        <span class="text-success small">Đã giảm <span th:text="${#numbers.formatDecimal(discountAmount, 0, 'COMMA', 0, 'POINT')}">0</span> VND</span>
                        <form th:action="@{/checkout/remove-voucher}" method="post" class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn btn-sm btn-outline-danger">Bỏ voucher</button>
                        </form>
                    </div>
                    <form th:if="${appliedVoucher == null}" th:action="@{/checkout/apply-voucher}" method="post" class="d-flex gap-2">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="text" name="voucherCode" class="form-control" placeholder="Nhập mã voucher" required>
                        <button type="submit" class="btn btn-outline-primary">Áp dụng</button>
                    </form>
                </div>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-header bg-light">
                    <h5 class="mb-0"><i class="bi bi-cart-check"></i> Đơn hàng</h5>
                </div>
                <div class="card-body">
                    <div th:each="item : ${cart.items}" class="d-flex justify-content-between align-items-center mb-2 pb-2 border-bottom">
                        <div>
                            <strong th:text="${item.book.title}">Title</strong>
                            <br><small class="text-muted">SL: <span th:text="${item.quantity}">0</span></small>
                        </div>
                        <div class="text-danger fw-bold" th:text="${#numbers.formatDecimal(item.subTotal, 0, 'COMMA', 0, 'POINT')} + ' VND'">0 VND</div>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mt-2" th:if="${discountAmount > 0}">
                        <span class="text-muted">Giảm giá:</span>
                        <span class="text-success" th:text="'-' + ${#numbers.formatDecimal(discountAmount, 0, 'COMMA', 0, 'POINT')} + ' VND'">0 VND</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <h5 class="mb-0">Tổng thanh toán:</h5>
                        <h4 class="text-danger mb-0" th:text="${#numbers.formatDecimal(finalTotal, 0, 'COMMA', 0, 'POINT')} + ' VND'">0 VND</h4>
                    </div>
                </div>
            </div>
            <a th:href="@{/cart}" class="btn btn-outline-secondary w-100 mt-3">
                <i class="bi bi-arrow-left"></i> Quay lại giỏ hàng
            </a>
        </div>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
