<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="vi">
<head th:replace="~{layout :: head}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán</title>
</head>
<body>
<nav th:replace="~{layout :: header}"></nav>

<main class="container my-5">
    <h2 class="fw-bold mb-4"><i class="bi bi-credit-card"></i> Thanh toán</h2>

    <div class="row">
        <div class="col-md-7">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="bi bi-person"></i> Thông tin khách hàng</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/checkout}" method="post">
                        <div class="mb-3">
                            <label for="customerName" class="form-label fw-bold">Họ và tên <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="customerName" name="customerName" 
                                   th:value="${user != null ? user.fullName : ''}" required>
                        </div>
                        <div class="mb-3">
                            <label for="customerEmail" class="form-label fw-bold">Email <span class="text-danger">*</span></label>
                            <input type="email" class="form-control" id="customerEmail" name="customerEmail" 
                                   th:value="${user != null ? user.email : ''}" required>
                        </div>
                        <div class="mb-3">
                            <label for="customerPhone" class="form-label fw-bold">Điện thoại <span class="text-danger">*</span></label>
                            <input type="tel" class="form-control" id="customerPhone" name="customerPhone" 
                                   th:value="${user != null ? user.phone : ''}" required>
                        </div>
                        <div class="mb-3">
                            <label for="customerAddress" class="form-label fw-bold">Địa chỉ nhận hàng <span class="text-danger">*</span></label>
                            <textarea class="form-control" id="customerAddress" name="customerAddress" rows="2" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-success w-100">
                            <i class="bi bi-check-circle"></i> Đặt hàng
                        </button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-5">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-light">
                    <h5 class="mb-0"><i class="bi bi-cart-check"></i> Đơn hàng</h5>
                </div>
                <div class="card-body">
                    <div th:each="item : ${cart.items}" class="d-flex justify-content-between align-items-center mb-2 pb-2 border-bottom">
                        <div>
                            <strong th:text="${item.book.title}">Title</strong>
                            <br><small class="text-muted">SL: <span th:text="${item.quantity}">0</span></small>
                        </div>
                        <div class="text-danger fw-bold" th:text="${#numbers.formatDecimal(item.subTotal, 0, 'COMMA', 0, 'POINT')} + ' VND'">0 VND</div>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <h5 class="mb-0">Tổng cộng:</h5>
                        <h4 class="text-danger mb-0" th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')} + ' VND'">0 VND</h4>
                    </div>
                </div>
            </div>
            <a th:href="@{/cart}" class="btn btn-outline-secondary w-100 mt-3">
                <i class="bi bi-arrow-left"></i> Quay lại giỏ hàng
            </a>
        </div>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
