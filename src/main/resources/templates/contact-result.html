<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}"></head>
<body>
<nav th:replace="~{layout :: header}"></nav>

<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0"><i class="bi bi-check-circle"></i> Gửi liên hệ thành công!</h4>
                </div>
                <div class="card-body p-4">
                    <div class="alert alert-success">
                        <p class="mb-0">Cảm ơn bạn đã liên hệ với chúng tôi. Chúng tôi sẽ phản hồi trong thời gian sớm nhất.</p>
                    </div>
                    <table class="table">
                        <tr>
                            <th class="text-muted" style="width: 150px;">Họ và tên:</th>
                            <td th:text="${fullName}">Name</td>
                        </tr>
                        <tr>
                            <th class="text-muted">Email:</th>
                            <td th:text="${email}">Email</td>
                        </tr>
                        <tr>
                            <th class="text-muted">Tin nhắn:</th>
                            <td th:text="${message}">Message</td>
                        </tr>
                    </table>
                    <a th:href="@{/}" class="btn btn-primary">
                        <i class="bi bi-house"></i> Về trang chủ
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
