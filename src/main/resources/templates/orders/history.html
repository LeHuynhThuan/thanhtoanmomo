<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="vi">
<head th:replace="~{layout :: head}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử đơn hàng</title>
</head>
<body>
<nav th:replace="~{layout :: header}"></nav>

<main class="container my-5">
    <h2 class="fw-bold mb-4"><i class="bi bi-receipt"></i> Lịch sử đơn hàng của bạn</h2>

    <div class="card border-0 shadow-sm" th:if="${orders != null && !orders.isEmpty()}">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>Mã đơn</th>
                        <th>Ngày đặt</th>
                        <th>Tổng tiền</th>
                        <th>Trạng thái</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="order : ${orders}">
                        <td>
                            <code th:text="${#strings.abbreviate(order.id, 8)}">ID</code>
                        </td>
                        <td th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}">Ngày</td>
                        <td th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' VND'">0 VND</td>
                        <td>
                            <span th:class="'badge status-badge status-' + ${order.status.name().toLowerCase()}"
                                  th:text="${order.status.displayName}">Trạng thái</span>
                        </td>
                        <td class="text-end">
                            <a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-eye"></i> Chi tiết
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="alert alert-info" th:if="${orders == null || orders.isEmpty()}">
        <i class="bi bi-info-circle"></i> Bạn chưa có đơn hàng nào.
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
