<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="vi">
<head th:replace="~{layout :: head}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết đơn hàng</title>
</head>
<body>
<nav th:replace="~{layout :: header}"></nav>

<main class="container my-5" th:if="${order != null}">
    <h2 class="fw-bold mb-4"><i class="bi bi-receipt"></i> Chi tiết đơn hàng</h2>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm mb-3">
                <div class="card-body">
                    <h5 class="card-title fw-bold">Thông tin đơn hàng</h5>
                    <p class="mb-1"><strong>Mã đơn:</strong> <span th:text="${order.id}">ID</span></p>
                    <p class="mb-1"><strong>Ngày đặt:</strong>
                        <span th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}">Ngày</span></p>
                    <p class="mb-1"><strong>Trạng thái:</strong>
                        <span th:class="'badge status-badge status-' + ${order.status.name().toLowerCase()}"
                              th:text="${order.status.displayName}">Trạng thái</span></p>
                    <p class="mb-0"><strong>Tổng tiền:</strong>
                        <span class="text-danger fw-bold"
                              th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' VND'">0 VND</span>
                    </p>
                </div>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title fw-bold">Thông tin giao hàng</h5>
                    <p class="mb-1"><strong>Khách hàng:</strong> <span th:text="${order.customerName}">Tên</span></p>
                    <p class="mb-1"><strong>Email:</strong> <span th:text="${order.customerEmail}">Email</span></p>
                    <p class="mb-1"><strong>Điện thoại:</strong> <span th:text="${order.customerPhone}">SĐT</span></p>
                    <p class="mb-0"><strong>Địa chỉ:</strong> <span th:text="${order.customerAddress}">Địa chỉ</span></p>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title fw-bold">Sản phẩm</h5>
                    <div class="table-responsive">
                        <table class="table table-sm mb-0">
                            <thead>
                            <tr>
                                <th>Sách</th>
                                <th>SL</th>
                                <th>Đơn giá</th>
                                <th>Thành tiền</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="item : ${order.items}">
                                <td th:text="${item.bookTitle}">Tên sách</td>
                                <td th:text="${item.quantity}">1</td>
                                <td th:text="${#numbers.formatDecimal(item.unitPrice, 0, 'COMMA', 0, 'POINT')} + ' VND'">0</td>
                                <td th:text="${#numbers.formatDecimal(item.totalPrice, 0, 'COMMA', 0, 'POINT')} + ' VND'">0</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-4">
        <a th:href="@{/orders}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Quay lại lịch sử đơn hàng
        </a>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
